{% load static %}
<link rel="stylesheet" href="{% static 'planner/css/style.css'%}"
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Panic Planner</title>
</head>
<body>
<h1> Panic Planner dashboard</h1>
<a href="{% url 'add_task' %}"> Add Task</a>
<hr>

{% for task in tasks %}

<h3>{{ task.title }}</h3>
<p>{{ task.description }}</p>
<p>{{ task.study_date }}</p>
<p>{{ task.priority }}</p>

{% if tasks.is_completed %}
<p> Completed</p>
{% else %}
<a href ="{% url 'complete_task' task.id % }"> Mark Complete</a>
{% endif %}

<a href="{% url 'update_task' task.id %}">Update</a>
<a href="{% url 'delete_task' task.id %}">Delete</a>

<hr>

{% endfor %}


<body>
</html>
