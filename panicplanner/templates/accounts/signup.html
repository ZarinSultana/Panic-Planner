<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            font-family:"Segoe UI", Arial, sans-serif;

            background:
                radial-gradient(circle at top left,
                rgba(56,189,248,0.18),
                transparent 35%),

                linear-gradient(135deg,#020617,#0f172a);

            color:white;
        }

        .main-wrapper{
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:30px;
        }

        .auth-card{
            width:100%;
            max-width:480px;

            background:rgba(15,23,42,0.92);

            border:1px solid rgba(148,163,184,0.15);

            border-radius:28px;

            padding:30px;

            box-shadow:0 30px 80px rgba(0,0,0,0.45);
        }

        .card-top{
            display:flex;
            justify-content:space-between;
            align-items:center;

            margin-bottom:35px;
        }

        .brand{
            font-size:22px;
            font-weight:800;
            color:#38bdf8;
        }

        .home-link{
            text-decoration:none;
            color:#38bdf8;
            font-weight:600;
        }

        .content{
            text-align:center;
        }

        .circle-icon{
            width:80px;
            height:80px;

            margin:0 auto 20px;

            border-radius:50%;

            background:rgba(56,189,248,0.12);

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:30px;
            color:#38bdf8;
        }

        h1{
            font-size:38px;
            margin-bottom:12px;
        }

        .subtitle{
            color:#94a3b8;
            margin-bottom:32px;
            line-height:1.6;
        }

        .input-box{
            margin-bottom:18px;
        }

        .input-box input{
            width:100%;

            padding:16px 18px;

            border-radius:14px;

            border:1px solid #334155;

            background:#020617;

            color:white;

            font-size:15px;

            outline:none;

            transition:0.3s;
        }

        .input-box input:focus{
            border-color:#38bdf8;

            box-shadow:0 0 0 3px rgba(56,189,248,0.15);
        }

        .input-box input::placeholder{
            color:#64748b;
        }

        .btn-custom{
            width:100%;

            border:none;

            padding:16px;

            border-radius:14px;

            background:linear-gradient(135deg,#38bdf8,#2563eb);

            color:white;

            font-size:16px;
            font-weight:800;

            cursor:pointer;

            margin-top:10px;

            transition:0.3s;
        }

        .btn-custom:hover{
            transform:translateY(-3px);

            box-shadow:0 16px 35px rgba(37,99,235,0.35);
        }

        .divider{
            margin:28px 0;

            display:flex;
            align-items:center;

            color:#64748b;
        }

        .divider::before,
        .divider::after{
            content:"";
            flex:1;
            height:1px;
            background:#334155;
        }

        .divider span{
            padding:0 14px;
            font-size:14px;
        }

        .google-btn{
            width:100%;

            padding:14px;

            border-radius:14px;

            border:1px solid #334155;

            background:#1e293b;

            color:#e2e8f0;

            font-size:15px;
            font-weight:700;

            cursor:pointer;
        }

        .bottom-text{
            margin-top:25px;

            color:#94a3b8;

            font-size:15px;
        }

        .bottom-text a{
            color:#38bdf8;
            text-decoration:none;
            font-weight:700;
        }

    </style>

</head>

<body>

<div class="main-wrapper">

    <div class="auth-card">

        <div class="card-top">

            <div class="brand">
                📘 Panic Planner
            </div>

            <a href="{% url 'home' %}" class="home-link">
                Home
            </a>

        </div>

        <div class="content">

            <div class="circle-icon">
                ✨
            </div>

            <h1>Create Account</h1>

            <p class="subtitle">
                Start organizing your study life smarter and faster.
            </p>

            <form method="POST">

                {% csrf_token %}

                <div class="input-box">
                    <input type="text"
                           name="username"
                           placeholder="Enter Username"
                           required>
                </div>

                <div class="input-box">
                    <input type="password"
                           name="password"
                           placeholder="Enter Password"
                           required>
                </div>

                <button type="submit" class="btn-custom">
                    Create Account
                </button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="google-btn">
                Signup with Google
            </button>

            <div class="bottom-text">

                Already have an account?

                <a href="{% url 'login' %}">
                    Login
                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
