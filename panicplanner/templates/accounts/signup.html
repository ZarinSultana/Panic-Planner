{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container main-wrapper">

    <div class="auth-card">

        <div class="card-top">

            <div class="brand signup-color">
                <i class="fa-regular fa-calendar"></i>
                Panic Planner
            </div>

            <a href="{% url 'home' %}" class="home-link signup-color">
                Home
            </a>

        </div>

        <div class="content">

            <div class="circle-icon">

                <i class="fa-solid fa-user signup-color"></i>

                <div class="small-plus">
                    <i class="fa-solid fa-plus"></i>
                </div>

            </div>

            <h1>Create Your Account</h1>

            <p class="subtitle">
                Join Panic Planner and start organizing your tasks easily.
            </p>

            <form method="POST">

                {% csrf_token %}

                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" class="form-control" placeholder="Username">
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" class="form-control" placeholder="Password">
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" class="form-control" placeholder="Confirm Password">
                </div>

                <button class="btn-custom signup-btn">
                    <i class="fa-solid fa-user-plus"></i>
                    Sign Up
                </button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="google-btn">
                Login with Google
            </button>

            <div class="bottom-text">
                Already have an account?
                <a href="{% url 'login' %}" class="signup-color">
                    Login
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
