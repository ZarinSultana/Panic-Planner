{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container main-wrapper">

    <div class="auth-card login-card">

        <div class="card-top">

            <div class="brand login-color">
                <i class="fa-regular fa-calendar"></i>
                Panic Planner
            </div>

            <a href="{% url 'home' %}" class="home-link login-color">
                Home
            </a>

        </div>

        <div class="content">

            <div class="circle-icon login-bg">
                <i class="fa-solid fa-lock login-color"></i>
            </div>

            <h1>Welcome Back!</h1>

            <p class="subtitle">
                Login to continue to your account.
            </p>

            {% if error %}
                <p style="color:red; margin-bottom:15px;">
                   {{ error }}
                </p>
            {% endif %}


            <form method="POST">

                {% csrf_token %}

                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="username" class="form-control" placeholder="Username">
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" class="form-control" placeholder="Password">
                </div>

                <div class="remember">

                    <div>
                        <input type="checkbox">
                        Remember me
                    </div>

                    <a href="#" class="forgot login-color">
                        Forgot password?
                    </a>

                </div>

                <button type="submit" class="btn-custom login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    Login
                </button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="google-btn">
                Login with Google
            </button>

            <div class="bottom-text">
                Don't have an account?
                <a href="{% url 'signup' %}" class="login-color">
                    Sign up
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
