{% extends'base.html' %}
% block content %}
<div class="form-container">
    <h2>
        Add Subject
    </h2>

  <p>
       Fill up the information below to create
        a new subject entry for your exam planner.
  </p>
    <form method="POST">
       {% csrf_token %}
        <div class="form-box">
            {{ form.as_p  }}

        </div>

        <button type="Submit">Save Subject</button>

    </form>

</div>
{%  endblock %}
