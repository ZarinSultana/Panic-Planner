<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Panic Planner</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo">Panic Planner</h2>

        <ul>
            <li>Dashboard</li>
            <li>Study Planner</li>
            <li>Syllabus</li>
            <li>Tasks</li>
            <li>Notes</li>
        </ul>
    </aside>

    <!-- Main content -->
    <main class="main">

        <!-- Topbar -->
        <div class="topbar">
            <div>Welcome, eifa</div>
            <div>Profile</div>
        </div>

        {% block content %}
        {% endblock %}

    </main>

</div>

</body>
</html>
