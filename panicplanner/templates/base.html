<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 35%),
                linear-gradient(135deg, #020617, #0f172a);
            color: #ffffff;
        }

        .main-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .auth-card {
            width: 100%;
            max-width: 470px;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.18);
            border-radius: 26px;
            padding: 28px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .brand {
            font-size: 20px;
            font-weight: 800;
            color: #38bdf8;
        }

        .home-link {
            text-decoration: none;
            color: #38bdf8;
            font-weight: 600;
        }

        .content {
            text-align: center;
        }

        .circle-icon {
            width: 76px;
            height: 76px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: rgba(56, 189, 248, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #38bdf8;
            font-size: 28px;
        }

        h1 {
            font-size: 34px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        .input-box span {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
        }

        .input-box input {
            width: 100%;
            padding: 15px 18px 15px 48px;
            border-radius: 14px;
            border: 1px solid #334155;
            background: #020617;
            color: #ffffff;
            font-size: 15px;
            outline: none;
        }

        .input-box input::placeholder {
            color: #64748b;
        }

        .input-box input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        .remember {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0 24px;
            font-size: 14px;
            color: #cbd5e1;
        }

        .forgot {
            text-decoration: none;
            color: #38bdf8;
        }

        .btn-custom {
            width: 100%;
            border: none;
            padding: 15px;
            border-radius: 14px;
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 35px rgba(37, 99, 235, 0.35);
        }

        .divider {
            margin: 28px 0;
            display: flex;
            align-items: center;
            color: #64748b;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #334155;
        }

        .divider span {
            padding: 0 14px;
            font-size: 14px;
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .bottom-text {
            margin-top: 25px;
            color: #94a3b8;
            font-size: 15px;
        }

        .bottom-text a {
            color: #38bdf8;
            font-weight: 700;
            text-decoration: none;
        }
    </style>

</head>

<body>

<div class="main-wrapper">

    <div class="auth-card login-card">

        <div class="card-top">

            <div class="brand">
                📅 Panic Planner
            </div>

            <a href="{% url 'home' %}" class="home-link">
                Home
            </a>

        </div>

        <div class="content">

            <div class="circle-icon">
                🔒
            </div>

            <h1>Welcome Back!</h1>

            <p class="subtitle">
                Login to continue to your account.
            </p>

            <form method="POST">

                {% csrf_token %}

                <div class="input-box">
                    <span>👤</span>
                    <input type="text" name="username" placeholder="Username">
                </div>

                <div class="input-box">
                    <span>🔒</span>
                    <input type="password" name="password" placeholder="Password">
                </div>

                <div class="remember">

                    <div>
                        <input type="checkbox">
                        Remember me
                    </div>

                    <a href="#" class="forgot">
                        Forgot password?
                    </a>

                </div>

                <button type="submit" class="btn-custom">
                    Login
                </button>

            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button class="google-btn">
                Login with Google
            </button>

            <div class="bottom-text">
                Don't have an account?
                <a href="{% url 'signup' %}">
                    Sign up
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
