{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Panic Planner</title>

    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    {% block extra_css %}
    {% endblock %}
</head>

<body>

<div class="layout">


    <div class="sidebar">
        <h1 style = "color:red;"> TESTING TEMPLATE</h1>

        <h2 class="logo">Panic Planner</h2>


        <ul class="menu">

            <li>
                <a href="{% url 'dashboard' %}">Dashboard</a>
            </li>

            <li>
                <a href="/generate-plan/">Study Planner</a>
            </li>

            <li>
                <a href="{% url 'subject_list' %}">Syllabus</a>
            </li>

            <li>
                <a href="/add/" class="active">
                    Add Study task
                </a>
            </li>




        </ul>

        <div class="logout-section">

            <a href="{% url 'logout' %}" class="logout-btn">
                Logout
            </a>

        </div>

    </div>


    <div class="main">

        <div class="topbar">

            <div class="welcome">
                Welcome, {{ user.username }}
            </div>

            <div class="profile">
                <span>Profile</span>
            </div>

        </div>

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
